<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Directe — Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        /* Navigation latérale */
        nav { width: 260px; background: var(--card); padding: 25px; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        
        /* Onglets */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; }
        .tab-btn { background: none; border: none; color: #94a3b8; padding: 12px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 10px 0 0 0; }

        /* Graphiques */
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 16px; height: 300px; border: 1px solid rgba(255,255,255,0.05); }

        /* Tableaux */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        tr.clickable { cursor: pointer; transition: 0.2s; }
        tr.clickable:hover { background: rgba(99, 102, 241, 0.05); }

        /* Statuts */
        .st-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .st-nouveau { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .st-encours { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .st-termine { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        /* Modale */
        .modal { display: none; position: fixed; z-index: 100; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 30px; border-radius: 20px; width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        .action-bar { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-act { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* Formulaire Finance */
        .finance-form { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; }
        .finance-form input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; flex: 1; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:var(--primary)">🏢 GESTION DIRECTE</h2>
    <button onclick="resetFilter()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom: 10px;">📊 Vue Globale</button>
    <button onclick="fetchData()" style="width:100%; padding:12px; background:none; border: 1px solid #334155; color:white; border-radius:8px; cursor:pointer;">🔄 Actualiser</button>
</nav>

<main>
    <div class="tabs">
        <button id="btn-tab-inter" class="tab-btn active" onclick="switchTab('interventions')">🔧 Interventions</button>
        <button id="btn-tab-devis" class="tab-btn" onclick="switchTab('devis')">📄 Devis</button>
        <button id="btn-tab-factures" class="tab-btn" onclick="switchTab('factures')">💰 Factures</button>
    </div>

    <div id="sec-interventions" class="section">
        <div class="stats-grid">
            <div class="stat-card"><h3>Total</h3><p id="total">-</p></div>
            <div class="stat-card"><h3>Nouveaux</h3><p id="count-new" style="color:var(--primary)">-</p></div>
            <div class="stat-card"><h3>En cours</h3><p id="count-prog" style="color:var(--warning)">-</p></div>
            <div class="stat-card"><h3>Terminés</h3><p id="count-done" style="color:var(--success)">-</p></div>
        </div>

        <div class="charts-container">
            <div class="chart-box"><canvas id="typeChart"></canvas></div>
            <div class="chart-box"><canvas id="buildingChart"></canvas></div>
        </div>

        <h3>Liste des incidents <span id="filter-tag" style="font-size:12px; color:var(--primary); margin-left:10px;"></span></h3>
        <table>
            <thead><tr><th>Statut</th><th>Immeuble</th><th>Type</th><th>Détails</th><th>Date</th></tr></thead>
            <tbody id="list-inter"></tbody>
        </table>
    </div>

    <div id="sec-devis" class="section" style="display:none;">
        <div class="finance-form">
            <input type="text" id="dev-immeuble" placeholder="Immeuble">
            <input type="text" id="dev-artisan" placeholder="Artisan">
            <input type="number" id="dev-montant" placeholder="Montant €">
            <button onclick="addFinance('devis')" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">+ Ajouter</button>
        </div>
        <table>
            <thead><tr><th>Immeuble</th><th>Artisan</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
            <tbody id="list-devis"></tbody>
        </table>
    </div>

    <div id="sec-factures" class="section" style="display:none;">
        <div class="finance-form">
            <input type="text" id="fac-immeuble" placeholder="Immeuble">
            <input type="text" id="fac-artisan" placeholder="Artisan">
            <input type="number" id="fac-montant" placeholder="Montant €">
            <button onclick="addFinance('factures')" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer;">+ Ajouter</button>
        </div>
        <table>
            <thead><tr><th>Immeuble</th><th>Artisan</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
            <tbody id="list-factures"></tbody>
        </table>
    </div>
</main>

<div id="modal" class="modal">
    <div class="modal-content">
        <span style="float:right; cursor:pointer;" onclick="closeModal()">✕</span>
        <h2 id="m-title" style="color:var(--primary); margin-top:0;">Signalement</h2>
        <div id="modal-body"></div>
        <div class="action-bar" id="modal-actions"></div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://nyowrqutvwrgpcwvyeup.supabase.co';
    const supabaseKey = 'sb_publishable_bMlwSVgIBf4nvt12h4FOBg_iuvRXHw4'; 
    const _sb = supabase.createClient(supabaseUrl, supabaseKey);

    let allInter = [], allDevis = [], allFactures = [];
    let selectedBld = null;
    let tChart, bChart;

    async function fetchData() {
        const resI = await _sb.from('interventions').select('*').order('created_at', { ascending: false });
        const resD = await _sb.from('devis').select('*').order('created_at', { ascending: false });
        const resF = await _sb.from('factures').select('*').order('created_at', { ascending: false });
        
        allInter = resI.data || [];
        allDevis = resD.data || [];
        allFactures = resF.data || [];
        
        updateView();
    }

    function switchTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + tab).style.display = 'block';
        document.getElementById('btn-tab-' + tab).classList.add('active');
    }

    function updateView() {
        const data = selectedBld ? allInter.filter(i => i.immeuble === selectedBld) : allInter;
        const devis = selectedBld ? allDevis.filter(i => i.immeuble === selectedBld) : allDevis;
        const fact = selectedBld ? allFactures.filter(i => i.immeuble === selectedBld) : allFactures;

        // Stats
        document.getElementById('total').innerText = data.length;
        document.getElementById('count-new').innerText = data.filter(i => (i.statut||'Nouveau')==='Nouveau').length;
        document.getElementById('count-prog').innerText = data.filter(i => i.statut==='En cours').length;
        document.getElementById('count-done').innerText = data.filter(i => i.statut==='Terminé').length;

        // Table Interventions
        document.getElementById('list-inter').innerHTML = data.map(item => {
            const st = item.statut || 'Nouveau';
            const cls = st === 'En cours' ? 'st-encours' : (st === 'Terminé' ? 'st-termine' : 'st-nouveau');
            return `<tr class="clickable" onclick="openModal('${item.id}')">
                <td><span class="st-badge ${cls}">${st}</span></td>
                <td><b>${item.immeuble}</b></td>
                <td>${item.type_travaux}</td>
                <td style="color:#94a3b8">${item.description.substring(0,40)}...</td>
                <td>${new Date(item.created_at).toLocaleDateString()}</td>
            </tr>`;
        }).join('');

        // Table Devis
        document.getElementById('list-devis').innerHTML = devis.map(item => `
            <tr><td>${item.immeuble}</td><td>${item.artisan}</td><td>${item.montant}€</td>
            <td><span class="st-badge ${item.statut==='Validé'?'st-termine':'st-encours'}">${item.statut}</span></td>
            <td><button onclick="updFin('devis','${item.id}','Validé')" style="background:var(--success); color:white; border:none; border-radius:4px; cursor:pointer;">Valider</button></td></tr>
        `).join('');

        // Table Factures
        document.getElementById('list-factures').innerHTML = fact.map(item => `
            <tr><td>${item.immeuble}</td><td>${item.artisan}</td><td>${item.montant}€</td>
            <td><span class="st-badge ${item.statut==='Payée'?'st-termine':'st-encours'}">${item.statut}</span></td>
            <td><button onclick="updFin('factures','${item.id}','Payée')" style="background:var(--success); color:white; border:none; border-radius:4px; cursor:pointer;">Payée</button></td></tr>
        `).join('');

        renderCharts(data);
    }

    function renderCharts(viewData) {
        const types = {}; viewData.forEach(i => types[i.type_travaux] = (types[i.type_travaux] || 0) + 1);
        const blds = {}; allInter.forEach(i => blds[i.immeuble] = (blds[i.immeuble] || 0) + 1);

        if(tChart) tChart.destroy();
        tChart = new Chart(document.getElementById('typeChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(types), datasets: [{ data: Object.values(types), backgroundColor: ['#6366f1','#10b981','#f59e0b','#ef4444'] }] },
            options: { maintainAspectRatio: false, plugins: { title: { display:true, text: 'Types pour ' + (selectedBld || 'Tous'), color:'#fff'} } }
        });

        if(bChart) bChart.destroy();
        bChart = new Chart(document.getElementById('buildingChart'), {
            type: 'bar',
            data: { labels: Object.keys(blds), datasets: [{ label: 'Incidents', data: Object.values(blds), backgroundColor: '#6366f1' }] },
            options: { 
                onClick: (e, el) => { if(el.length > 0) { selectedBld = Object.keys(blds)[el[0].index]; updateView(); } },
                maintainAspectRatio: false, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } 
            }
        });
    }

    async function addFinance(table) {
        const pre = table === 'devis' ? 'dev' : 'fac';
        await _sb.from(table).insert([{
            immeuble: document.getElementById(pre+'-immeuble').value,
            artisan: document.getElementById(pre+'-artisan').value,
            montant: document.getElementById(pre+'-montant').value,
            statut: 'En attente'
        }]);
        fetchData();
    }

    async function updFin(table, id, st) {
        await _sb.from(table).update({ statut: st }).eq('id', id);
        fetchData();
    }

    async function updStatus(id, st) {
        await _sb.from('interventions').update({ statut: st }).eq('id', id);
        closeModal(); fetchData();
    }

    function openModal(id) {
        const item = allInter.find(i => i.id == id);
        const st = item.statut || 'Nouveau';
        document.getElementById('modal-body').innerHTML = `
            <p><b>Immeuble:</b> ${item.immeuble}</p>
            <p><b>Type:</b> ${item.type_travaux}</p>
            <div style="background:#0f172a; padding:15px; border-radius:10px;">${item.description}</div>
        `;
        let b = '';
        if(st!=='En cours') b+=`<button class="btn-act" style="background:var(--warning)" onclick="updStatus('${id}','En cours')">👷 En cours</button>`;
        if(st!=='Terminé') b+=`<button class="btn-act" style="background:var(--success)" onclick="updStatus('${id}','Terminé')">✅ Terminé</button>`;
        document.getElementById('modal-actions').innerHTML = b;
        document.getElementById('modal').style.display = 'block';
    }

    function resetFilter() { selectedBld = null; updateView(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    fetchData();
</script>
</body>
</html>
