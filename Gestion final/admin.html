<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Directe — Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        nav { width: 260px; background: var(--card); padding: 25px; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .btn-act { border: none; padding: 8px 15px; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <h2 style="color:var(--primary)">Gestion Directe</h2>
        <p style="color:#64748b; font-size:0.8rem;">ADMINISTRATION</p>
    </nav>
    <main>
        <div class="card">
            <h3>Interventions en cours</h3>
            <table id="table-inter">
                <thead><tr><th>Immeuble</th><th>Type</th><th>Statut</th><th>Action</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://nyowrqutvwrgpcwvyeup.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55b3dycXV0dndyZ3Bjd3Z5ZXVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDE1MzUsImV4cCI6MjA5NDA3NzUzNX0.fl3MNDrEJOpH5JMHvKCJQDNfQZ1V4sZKEPWUai8MKf8';
        const _sb = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchData() {
            const { data, error } = await _sb.from('interventions').select('*').order('created_at', { ascending: false });
            if (error) console.log("Erreur:", error);
            const tbody = document.querySelector('#table-inter tbody');
            tbody.innerHTML = (data || []).map(item => `
                <tr>
                    <td>${item.immeuble}</td>
                    <td>${item.type_travaux}</td>
                    <td><span class="status" style="background:var(--primary)">${item.statut || 'Nouveau'}</span></td>
                    <td><button class="btn-act" style="background:var(--primary)" onclick="alert('${item.description}')">Détails</button></td>
                </tr>
            `).join('');
        }
        fetchData();
    </script>
</body>
</html>
