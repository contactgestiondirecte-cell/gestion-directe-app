<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Directe — Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        nav { width: 260px; background: var(--card); padding: 25px; border-right: 1px solid var(--border); flex-shrink: 0; }
        main { flex: 1; padding: 40px; overflow-y: auto; }

        /* Système d'onglets */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 12px 20px; background: var(--card); border: 1px solid var(--border); color: #94a3b8; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .section { display: none; }
        .section.active { display: block; }

        /* Formulaires Rapides */
        .quick-add { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 10px; align-items: end; }
        .quick-add input { background: #0f172a; border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: white; }
        .quick-add label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-wait { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .bg-ok { background: rgba(16, 185, 129, 0.2); color: var(--success); }

        .btn-sm { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:var(--primary); margin-bottom:30px;">GESTION DIRECTE</h2>
    <p style="font-size: 12px; color: #94a3b8;">TABLEAU DE BORD MASTER</p>
    <button onclick="fetchData()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; margin-top:20px;">🔄 Actualiser</button>
</nav>

<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('inter')">👷 Interventions</button>
        <button class="tab-btn" onclick="showTab('devis')">📄 Devis</button>
        <button class="tab-btn" onclick="showTab('factures')">💰 Factures</button>
    </div>

    <div id="section-inter" class="section active">
        <h1>Interventions Locataires</h1>
        <table>
            <thead><tr><th>Statut</th><th>Immeuble</th><th>Type</th><th>Description</th></tr></thead>
            <tbody id="list-inter"></tbody>
        </table>
    </div>

    <div id="section-devis" class="section">
        <h1>Gestion des Devis</h1>
        <div class="quick-add">
            <div><label>Immeuble</label><input type="text" id="dev-immeuble" placeholder="Ex: Rivoli"></div>
            <div><label>Artisan</label><input type="text" id="dev-artisan" placeholder="Ex: Plombier"></div>
            <div><label>Montant (€)</label><input type="number" id="dev-montant"></div>
            <button class="btn-sm" style="background:var(--success); color:white; height:40px;" onclick="addFin('devis')">+ Ajouter</button>
        </div>
        <table>
            <thead><tr><th>Date</th><th>Immeuble</th><th>Artisan</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
            <tbody id="list-devis"></tbody>
        </table>
    </div>

    <div id="section-factures" class="section">
        <h1>Suivi des Factures</h1>
        <div class="quick-add">
            <div><label>Immeuble</label><input type="text" id="fac-immeuble" placeholder="Ex: Rivoli"></div>
            <div><label>Artisan</label><input type="text" id="fac-artisan" placeholder="Ex: Peintre"></div>
            <div><label>Montant (€)</label><input type="number" id="fac-montant"></div>
            <button class="btn-sm" style="background:var(--success); color:white; height:40px;" onclick="addFin('factures')">+ Ajouter</button>
        </div>
        <table>
            <thead><tr><th>Date</th><th>Immeuble</th><th>Artisan</th><th>Montant</th><th>Statut</th><th>Action</th></tr></thead>
            <tbody id="list-factures"></tbody>
        </table>
    </div>
</main>

<script>
    const supabaseUrl = 'https://nyowrqutvwrgpcwvyeup.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55b3dycXV0dndyZ3Bjd3Z5ZXVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDE1MzUsImV4cCI6MjA5NDA3NzUzNX0.fl3MNDrEJOpH5JMHvKCJQDNfQZ1V4sZKEPWUai8MKf8';
    const _sb = supabase.createClient(supabaseUrl, supabaseKey);

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('section-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    async function addFin(table) {
        const prefix = table === 'devis' ? 'dev' : 'fac';
        const { error } = await _sb.from(table).insert([{
            immeuble: document.getElementById(prefix+'-immeuble').value,
            artisan: document.getElementById(prefix+'-artisan').value,
            montant: document.getElementById(prefix+'-montant').value,
            statut: 'En attente'
        }]);
        if(!error) { 
            fetchData();
            document.getElementById(prefix+'-immeuble').value = '';
            document.getElementById(prefix+'-artisan').value = '';
            document.getElementById(prefix+'-montant').value = '';
        }
    }

    async function updateFin(table, id, currentStatut) {
        const next = currentStatut === 'En attente' ? 'Validé' : 'Payé';
        await _sb.from(table).update({ statut: next }).eq('id', id);
        fetchData();
    }

    async function fetchData() {
        // Charger Interventions
        const { data: inters } = await _sb.from('interventions').select('*').order('created_at', { ascending: false });
        document.getElementById('list-inter').innerHTML = (inters || []).map(i => `
            <tr>
                <td><span class="badge bg-wait">${i.statut || 'Nouveau'}</span></td>
                <td><b>${i.immeuble}</b></td>
                <td>${i.type_travaux}</td>
                <td style="font-size:11px; opacity:0.7;">${i.description.substring(0,50)}...</td>
            </tr>`).join('');

        // Charger Devis
        const { data: devis } = await _sb.from('devis').select('*').order('created_at', { ascending: false });
        document.getElementById('list-devis').innerHTML = (devis || []).map(d => `
            <tr>
                <td>${new Date(d.created_at).toLocaleDateString()}</td>
                <td>${d.immeuble}</td>
                <td><b>${d.artisan}</b></td>
                <td>${d.montant} €</td>
                <td><span class="badge ${d.statut === 'Validé' ? 'bg-ok' : 'bg-wait'}">${d.statut}</span></td>
                <td><button class="btn-sm" onclick="updateFin('devis', ${d.id}, '${d.statut}')">✅ Valider</button></td>
            </tr>`).join('');

        // Charger Factures
        const { data: facs } = await _sb.from('factures').select('*').order('created_at', { ascending: false });
        document.getElementById('list-factures').innerHTML = (facs || []).map(f => `
            <tr>
                <td>${new Date(f.created_at).toLocaleDateString()}</td>
                <td>${f.immeuble}</td>
                <td><b>${f.artisan}</b></td>
                <td>${f.montant} €</td>
                <td><span class="badge ${f.statut === 'Payé' ? 'bg-ok' : 'bg-wait'}">${f.statut}</span></td>
                <td><button class="btn-sm" onclick="updateFin('factures', ${f.id}, '${f.statut}')">💰 Marquer Payée</button></td>
            </tr>`).join('');
    }

    fetchData();
</script>
</body>
</html>
