<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion Directe — Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #6366f1; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        nav { width: 260px; background: var(--card); padding: 25px; border-right: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h3 { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin: 0; }
        .stat-card p { font-size: 24px; font-weight: bold; margin: 10px 0 0 0; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 16px; overflow: hidden; }
        th { text-align: left; padding: 15px; background: rgba(255,255,255,0.05); color: #94a3b8; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .st-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        .st-nouveau { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .st-encours { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .st-termine { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .modal { display: none; position: fixed; z-index: 100; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 30px; border-radius: 20px; width: 450px; }
        .btn-act { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>
<nav>
    <h2 style="color:var(--primary)">GD ADMIN</h2>
    <button onclick="fetchData()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">🔄 Actualiser</button>
</nav>
<main>
    <div class="stats-grid">
        <div class="stat-card"><h3>Total</h3><p id="total">-</p></div>
        <div class="stat-card"><h3>Nouveaux</h3><p id="count-new" style="color:var(--primary)">-</p></div>
        <div class="stat-card"><h3>En cours</h3><p id="count-prog" style="color:var(--warning)">-</p></div>
        <div class="stat-card"><h3>Terminés</h3><p id="count-done" style="color:var(--success)">-</p></div>
    </div>
    <table>
        <thead><tr><th>Statut</th><th>Immeuble</th><th>Type</th><th>Détails</th><th>Action</th></tr></thead>
        <tbody id="list-inter"></tbody>
    </table>
</main>
<div id="modal" class="modal"><div class="modal-content"><h2 id="m-title">Détails</h2><div id="modal-body"></div><div id="modal-actions" style="margin-top:20px"></div><button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:white; cursor:pointer;">Fermer</button></div></div>
<script>
    const supabaseUrl = 'https://nyowrqutvwrgpcwvyeup.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55b3dycXV0dndyZ3Bjd3Z5ZXVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDE1MzUsImV4cCI6MjA5NDA3NzUzNX0.fl3MNDrEJOpH5JMHvKCJQDNfQZ1V4sZKEPWUai8MKf8';
    const _sb = supabase.createClient(supabaseUrl, supabaseKey);
    let allInter = [];
    async function fetchData() {
        const { data } = await _sb.from('interventions').select('*').order('created_at', { ascending: false });
        allInter = data || [];
        document.getElementById('total').innerText = allInter.length;
        document.getElementById('count-new').innerText = allInter.filter(i => (i.statut||'Nouveau')==='Nouveau').length;
        document.getElementById('count-prog').innerText = allInter.filter(i => i.statut==='En cours').length;
        document.getElementById('count-done').innerText = allInter.filter(i => i.statut==='Terminé').length;
        document.getElementById('list-inter').innerHTML = allInter.map(item => `
            <tr>
                <td><span class="st-badge ${item.statut==='En cours'?'st-encours':(item.statut==='Terminé'?'st-termine':'st-nouveau')}">${item.statut||'Nouveau'}</span></td>
                <td><b>${item.immeuble}</b></td>
                <td>${item.type_travaux}</td>
                <td>${item.description.substring(0,30)}...</td>
                <td><button onclick="openModal('${item.id}')" style="background:var(--primary); border:none; color:white; padding:5px 10px; border-radius:4px; cursor:pointer;">Ouvrir</button></td>
            </tr>`).join('');
    }
    function openModal(id) {
        const item = allInter.find(i => i.id == id);
        document.getElementById('modal-body').innerHTML = `<p>${item.description}</p>`;
        document.getElementById('modal-actions').innerHTML = `
            <button class="btn-act" style="background:var(--warning)" onclick="updStatus('${id}','En cours')">👷 En cours</button>
            <button class="btn-act" style="background:var(--success)" onclick="updStatus('${id}','Terminé')">✅ Terminé</button>`;
        document.getElementById('modal').style.display = 'block';
    }
    async function updStatus(id, st) { await _sb.from('interventions').update({ statut: st }).eq('id', id); closeModal(); fetchData(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    fetchData();
</script>
</body>
</html>
